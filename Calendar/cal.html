<!DOCTYPE html>
<html lang='en'>
  <head>
    <meta charset='utf-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1' />
    <script src='https://cdn.jsdelivr.net/npm/rrule@2.8.1/dist/es5/rrule.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/@fullcalendar/rrule@6.1.20/index.global.min.js'></script>
    <script src='./events.generated.js'></script>
    <script>
      (function() {
        var CACHE_KEY = 'calendar-theme-bootstrap-v1';
        var raw = null;
        try {
          raw = window.localStorage ? window.localStorage.getItem(CACHE_KEY) : null;
        } catch (error) {
          return;
        }
        if (!raw) return;

        var cached = null;
        try {
          cached = JSON.parse(raw);
        } catch (error) {
          return;
        }
        if (!cached || typeof cached !== 'object') return;
        var vars = cached.vars && typeof cached.vars === 'object' ? cached.vars : null;
        if (!vars) return;

        var root = document.documentElement;
        Object.keys(vars).forEach(function(key) {
          var value = vars[key];
          if (String(key).indexOf('--') !== 0) return;
          if (typeof value !== 'string' || !value.trim()) return;
          root.style.setProperty(key, value);
        });
      })();
    </script>
    <link rel='stylesheet' href='./cal.css' />
    <script src='./cal.app.js'></script>
  </head>
  <body>
    <div id='calendar'></div>
    <div id='calendar-label-settings' class='calendar-settings-popover' aria-hidden='true'>
      <p class='calendar-settings-popover__title'>Calendar settings</p>
      <p class='calendar-settings-popover__hint'>Control labels, Google source, month width, roundness, and day/week row density.</p>
      <label class='calendar-settings-popover__check'>
        <input id='toggle-society-badges' type='checkbox' checked />
        <span>Show NICA/TOHU badges</span>
      </label>
      <label class='calendar-settings-popover__check'>
        <input id='toggle-recurring-badge' type='checkbox' checked />
        <span>Show REC badge</span>
      </label>
      <label class='calendar-settings-popover__check'>
        <input id='toggle-google-create-events' type='checkbox' />
        <span>Create new events on Google</span>
      </label>
      <label class='calendar-settings-popover__check'>
        <input id='toggle-nextcloud-create-events' type='checkbox' />
        <span>Create new events on Nextcloud</span>
      </label>
      <div id='setting-nextcloud-calendars' class='calendar-settings-popover__group' hidden>
        <p class='calendar-settings-popover__field'>Nextcloud calendars</p>
        <div id='setting-nextcloud-calendars-list' class='calendar-settings-popover__checks'></div>
      </div>
      <div class='calendar-settings-popover__actions'>
        <button id='google-oauth-connect' class='event-preview-popover__btn event-preview-popover__btn--primary' type='button'>Connect Google OAuth</button>
        <button id='google-oauth-disconnect' class='event-preview-popover__btn' type='button'>Disconnect</button>
      </div>
      <label class='calendar-settings-popover__check'>
        <input id='toggle-event-preview' type='checkbox' checked />
        <span>Click opens preview pop-up</span>
      </label>
      <label class='calendar-settings-popover__check'>
        <input id='toggle-vacation-texture' type='checkbox' checked />
        <span>Use texture for background events</span>
      </label>
      <p id='setting-google-status' class='calendar-settings-popover__status'>Google source not configured.</p>
      <p id='setting-nextcloud-status' class='calendar-settings-popover__status'>Nextcloud source not configured.</p>
      <label class='calendar-settings-popover__field' for='setting-month-width'>Year view month width</label>
      <div class='calendar-settings-popover__range-wrap'>
        <input id='setting-month-width' class='calendar-settings-popover__range' type='range' min='20' max='50' step='1' />
        <span id='setting-month-width-value' class='calendar-settings-popover__value'>30 %</span>
      </div>
      <label class='calendar-settings-popover__field' for='setting-roundness'>Global roundness</label>
      <div class='calendar-settings-popover__range-wrap'>
        <input id='setting-roundness' class='calendar-settings-popover__range' type='range' min='0' max='24' step='1' />
        <span id='setting-roundness-value' class='calendar-settings-popover__value'>8 px</span>
      </div>
      <label class='calendar-settings-popover__field' for='setting-timegrid-row-height'>Day/week row height</label>
      <div class='calendar-settings-popover__range-wrap'>
        <input id='setting-timegrid-row-height' class='calendar-settings-popover__range' type='range' min='16' max='48' step='1' />
        <span id='setting-timegrid-row-height-value' class='calendar-settings-popover__value'>26 px</span>
      </div>
    </div>
    <div id='create-event-modal' class='event-modal' aria-hidden='true'>
      <div class='event-modal__card' role='dialog' aria-modal='true' aria-label='Create event'>
        <h3 class='event-modal__title'>Create event</h3>
        <input id='create-event-title' class='event-modal__input' type='text' placeholder='Event title' />
        <div id='create-event-tabs' class='event-modal__tabs' role='tablist' aria-label='Create target'>
          <button id='create-event-tab-md' class='event-modal__tab is-active' type='button' role='tab' aria-selected='true' aria-controls='create-event-panel-md'>md</button>
          <button id='create-event-tab-google' class='event-modal__tab' type='button' role='tab' aria-selected='false' aria-controls='create-event-panel-google'>google</button>
          <button id='create-event-tab-nextcloud' class='event-modal__tab' type='button' role='tab' aria-selected='false' aria-controls='create-event-panel-nextcloud'>nextcloud</button>
        </div>
        <div id='create-event-panel-md' class='event-modal__panel is-active' role='tabpanel' aria-labelledby='create-event-tab-md'>
          <div class='event-modal__panel-actions'>
            <button id='create-event-confirm-md' class='event-modal__btn event-modal__btn--primary' type='button'>Create event</button>
          </div>
        </div>
        <div id='create-event-panel-google' class='event-modal__panel' role='tabpanel' aria-labelledby='create-event-tab-google' hidden>
          <label class='event-modal__field' for='create-event-google-color'>Color</label>
          <select id='create-event-google-color' class='event-modal__select'></select>
          <p id='create-event-google-color-hint' class='event-modal__hint' hidden></p>
          <div class='event-modal__panel-actions'>
            <button id='create-event-confirm-google' class='event-modal__btn event-modal__btn--primary' type='button'>Create event</button>
          </div>
        </div>
        <div id='create-event-panel-nextcloud' class='event-modal__panel' role='tabpanel' aria-labelledby='create-event-tab-nextcloud' hidden>
          <p class='event-modal__field'>Calendar</p>
          <div id='create-event-nextcloud-calendars' class='event-modal__radios'></div>
          <p id='create-event-nextcloud-calendar-hint' class='event-modal__hint' hidden></p>
          <div class='event-modal__panel-actions'>
            <button id='create-event-confirm-nextcloud' class='event-modal__btn event-modal__btn--primary' type='button'>Create event</button>
          </div>
        </div>
        <div class='event-modal__actions'>
          <button id='create-event-cancel' class='event-modal__btn' type='button'>Cancel</button>
        </div>
      </div>
    </div>
    <div id='day-action-modal' class='day-action-menu' role='dialog' aria-modal='false' aria-label='Day actions' aria-hidden='true'>
      <button id='day-action-focus' class='day-action-menu__item' type='button'>Set focus day</button>
      <button id='day-action-create' class='day-action-menu__item day-action-menu__item--primary' type='button'>Create event</button>
    </div>
    <div id='event-preview-popover' class='event-preview-popover' role='dialog' aria-modal='false' aria-hidden='true'>
      <button id='event-preview-close' class='event-preview-popover__close' type='button' aria-label='Close event preview'>×</button>
      <h3 id='event-preview-title' class='event-preview-popover__title'>Event</h3>
      <p id='event-preview-date' class='event-preview-popover__date'></p>
      <div id='event-preview-body' class='event-preview-popover__body'></div>
      <div class='event-preview-popover__actions'>
        <button id='event-preview-open-map' class='event-preview-popover__btn' type='button' hidden>map</button>
        <button id='event-preview-edit-google' class='event-preview-popover__btn' type='button' hidden>Rename</button>
        <button id='event-preview-delete-google' class='event-preview-popover__btn' type='button' hidden>Delete</button>
        <button id='event-preview-open-note' class='event-preview-popover__btn event-preview-popover__btn--primary' type='button'>Open note in new tab</button>
      </div>
    </div>
  </body>
</html>
